version: "1.0.0"
title: Monitor Active Tasks
description: Scheduled scan of active_tasks.md across orchestrated projects. Detects stuck/permission/completion states, escalates via Telegram. Replaces the omniclaude pane polling pattern.

parameters:
  - key: stuck_threshold_minutes
    input_type: number
    requirement: optional
    description: Minutes of no progress before flagging a task as stuck. Default 10.

extensions:
  - type: builtin
    name: developer
  - type: stdio
    name: memorymaster
    cmd: python
    args: ["-m", "memorymaster.mcp_server"]
    envs:
      MEMORYMASTER_DEFAULT_DB: "G:\\_OneDrive\\OneDrive\\Desktop\\Py Apps\\memorymaster\\memorymaster.db"
      MEMORYMASTER_WORKSPACE: "G:\\_OneDrive\\OneDrive\\Desktop\\Py Apps\\memorymaster"

prompt: |
  Per-tick monitor sweep — execute briefly, no exploration:

  1. List orchestrated projects (those with monitoring.md + vault/active_tasks.md):
       - read `~/.orchestra-goose/orchestrated-projects.txt` if present
       - else default to ["G:/_OneDrive/OneDrive/Desktop/Py Apps/wezbridge"]

  2. For each project, read its `vault/active_tasks.md`. For each task with `status: in_progress`:
       - check `dispatched_at` timestamp; if > {{ stuck_threshold_minutes | default 10 }} minutes ago AND no recent commit on the project branch → flag as STUCK.
       - check `corr` correlation id appearing in any recent commit message → if yes, flag as LIKELY_COMPLETE (suggest user mark status: completed).

  3. For each STUCK or LIKELY_COMPLETE finding, ingest a short MemoryMaster claim via `mcp__memorymaster__ingest_claim` (claim_type=event, source_agent=orchestra-goose-monitor) so the user sees it in next session's recall.

  4. Summarize findings in 3-5 lines. Emit nothing if everything is healthy.

  Out of scope this tick: posting to Telegram (separate escalation recipe).
